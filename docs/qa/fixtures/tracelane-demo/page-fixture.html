<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>tracelane demo fixture</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 32rem; margin: 2rem auto; }
      form { display: grid; gap: 0.75rem; margin-top: 1rem; }
      input { padding: 0.5rem; font-size: 1rem; }
      button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; }
      #log { margin-top: 1rem; font-family: monospace; font-size: 0.9rem; color: #555; }
    </style>
  </head>
  <body>
    <h1 id="title">tracelane demo fixture</h1>
    <p>A QA harness for the failing-test report. Typing in the password field
       proves masking; the button click logs to console and fires a 404 fetch.</p>
    <form id="login" autocomplete="off">
      <label>Username <input id="user" name="user" type="text" /></label>
      <label>Password <input id="pw" name="pw" type="password" /></label>
      <button id="go" type="button">Submit</button>
    </form>
    <div id="log"></div>
    <script>
      document.getElementById('go').addEventListener('click', async () => {
        console.log('[tracelane-demo] button clicked');
        const log = document.getElementById('log');
        const item = document.createElement('div');
        item.textContent = 'clicked at ' + new Date().toISOString();
        log.appendChild(item);
        try {
          // 404 on purpose — gives the CDP network-capture path something to log.
          await fetch('/api/will-fail');
        } catch { /* expected */ }
      });
    </script>
  </body>
</html>
