name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

# Workflow-default permissions are minimal. The release job overrides with
# the elevated set it needs (contents:write for tags, id-token:write for npm
# OIDC). See CONTRIBUTING.md §"Workflow security hard rules".
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write   # required for npm OIDC Trusted Publishing
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '24'
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@06245a4e0a36c064a573d4150030f5ec548e4fcc  # v1.4.10
        with:
          publish: pnpm release
          # `pnpm run version` runs the root package.json `version` script:
          # `changeset version` then `biome check --write .` + `pnpm install
          # --lockfile-only`, so the bot's "Version Packages" commit is already
          # biome-formatted and the lockfile stays consistent. Without the
          # self-format step the bot rewrites package.json `files`/`keywords`
          # into multi-line form that biome's formatter rejects, turning the
          # required `ci` gate red after every release.
          #
          # Must be `pnpm run version`, NOT `pnpm version`: bare `pnpm version`
          # hits pnpm's built-in version command (prints runtime versions) and
          # skips the npm script entirely, reintroducing the drift. Likewise a
          # bare `changeset version` skips the self-format step.
          version: pnpm run version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish the peek MCP server to the official MCP Registry (the canonical,
      # upstream source of truth) whenever @peekdev/mcp is released to npm.
      # Runs LAST and only on an actual publish: the npm release is the critical
      # path, so a registry hiccup that reds this step never undoes the npm
      # publish (re-running the job is safe — changesets skips already-published
      # versions). Ownership is proven by the `mcpName` field in the published
      # package (packages/peek-mcp/package.json); auth is GitHub OIDC (id-token
      # write is granted above), which can claim io.github.cubenest/* because
      # this repo is in the Cubenest org. Downstream registries (PulseMCP,
      # Smithery, mcp.so) do NOT auto-ingest from here — they are submitted
      # separately (see docs/peek/distribution/README.md).
      - name: Publish peek to the official MCP Registry
        if: steps.changesets.outputs.published == 'true' && contains(steps.changesets.outputs.publishedPackages, '"@peekdev/mcp"')
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -euo pipefail
          version="$(printf '%s' "$PUBLISHED_PACKAGES" | jq -r '.[] | select(.name=="@peekdev/mcp") | .version')"
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "::notice::@peekdev/mcp not in publishedPackages; skipping registry publish"
            exit 0
          fi
          echo "Publishing peek-mcp $version to registry.modelcontextprotocol.io"
          # Wait for npm to propagate the version + mcpName (the registry
          # validates mcpName on the package at exactly this version).
          for i in $(seq 1 10); do
            got="$(npm view "@peekdev/mcp@$version" mcpName 2>/dev/null || true)"
            [ "$got" = "io.github.cubenest/peek-mcp" ] && break
            echo "waiting for npm propagation ($i/10)…"; sleep 6
          done
          cd packages/peek-mcp
          # Sync server.json to the just-published npm version before publishing.
          tmp="$(mktemp)"
          jq --arg v "$version" '.version = $v | .packages[0].version = $v' server.json > "$tmp"
          mv "$tmp" server.json
          # Install the publisher CLI (no brew on the runner).
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
