name: DCO

on:
  pull_request:
    branches: [main]

# Workflow-default permissions are minimal. The DCO job only needs to read the
# PR's commits, nothing else. See CONTRIBUTING.md §"Workflow security hard rules".
permissions:
  contents: read

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      - name: Check DCO sign-off
        uses: tim-actions/dco@2fd0504dc0d27b33f542867c300c60840c6dcb20  # v1.1.0
        with:
          commits: ${{ github.event.pull_request.commits }}
