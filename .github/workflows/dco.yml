name: DCO

on:
  pull_request:
    branches: [main]

# Workflow-default permissions are minimal. The DCO job only needs to read the
# PR's commits, nothing else. See CONTRIBUTING.md §"Workflow security hard rules".
permissions:
  contents: read

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      # `github.event.pull_request.commits` is the commit COUNT, not the list —
      # passing it to tim-actions/dco throws "commits is not iterable" on every
      # multi-commit PR. get-pr-commits returns the actual commit array.
      - name: Get PR commits
        id: get_pr_commits
        uses: tim-actions/get-pr-commits@198af03565609bb4ed924d1260247b4881f09e7d  # v1.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check DCO sign-off
        uses: tim-actions/dco@2fd0504dc0d27b33f542867c300c60840c6dcb20  # v1.1.0
        with:
          commits: ${{ steps.get_pr_commits.outputs.commits }}
